version: '3.8'

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: recruitment_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword@123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - recruitment_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: recruitment_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Database=RecruitmentDb;User=sa;Password=YourPassword@123;"
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - recruitment_network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: recruitment_frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - recruitment_network

networks:
  recruitment_network:
    driver: bridge

volumes:
  sqlserver_data: